# Render Blueprint (free tier): Node API + Vite React web (`webapp/`).
# - API (`fashionai-api`): Express + MongoDB; proxies HF ViT classify and OpenRouter
#   (chat, audio, mirror, and ViT-failure vision classify fallback).
# - Web (`fashionai-web`): static build from `webapp/` (React + Vite), SPA rewrites.
# URLs follow https://<service-name>.onrender.com — keep service names aligned with
# ALLOWED_ORIGINS on the API and VITE_* URLs on the web build.
#
# First deploy: set MONGODB_URI in the Dashboard if the wizard omitted sync: false vars.
# Set OPENROUTER_API_KEY for mirror, chat/audio, and classify fallback when HF is down.
#
# Auth0 (optional for webapp): create an SPA application; set Dashboard vars below.
# Allowed Callback / Logout URLs: https://fashionai-web.onrender.com (and localhost for dev).

services:
  - type: web
    name: fashionai-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: ALLOWED_ORIGINS
        value: "https://fashionai-web.onrender.com,http://localhost:*,http://127.0.0.1:*"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false

  - type: web
    name: fashionai-web
    runtime: static
    plan: free
    region: oregon
    rootDir: webapp
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    buildFilter:
      paths:
        - webapp/**
    envVars:
      # Baked into the Vite client at build time (must match your API + Auth0 app).
      - key: VITE_API_BASE_URL
        value: https://fashionai-api-6w7k.onrender.com
      - key: VITE_AUTH0_CALLBACK_URL
        value: https://fashionai-web.onrender.com
      - key: VITE_AUTH0_DOMAIN
        sync: false
      - key: VITE_AUTH0_CLIENT_ID
        sync: false
      - key: VITE_AUTH0_AUDIENCE
        sync: false

# Flutter web (Docker) is not part of this blueprint; use `Dockerfile.web` locally or
# add a separate Render service if you still ship Flutter web builds.
