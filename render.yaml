# Render Blueprint (free tier): Node API + Flutter web (Docker/nginx).
# - API (`fashionai-api`): builds from the repo default branch (main).
# - Web (`fashionai-web`): builds from branch `Webapp` (Flutter web parity).
# URLs follow https://<service-name>.onrender.com — keep these names or update
# ALLOWED_ORIGINS / API_BASE_URL together.
#
# First deploy: you MUST set MONGODB_URI (e.g. MongoDB Atlas free M0 cluster +
# Database Access user + Network Access allow 0.0.0.0/0). If the blueprint
# wizard skipped sync: false vars, add MONGODB_URI under Environment manually.
# Also set OPENROUTER_API_KEY for chat/audio features.
#
# Auth0 (optional): set AUTH0_DOMAIN + AUTH0_AUDIENCE; add Allowed Callback URL
# https://fashionai-web.onrender.com/auth.html (Webapp: static web/auth.html for flutter_web_auth_2).

services:
  - type: web
    name: fashionai-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: ALLOWED_ORIGINS
        value: "https://fashionai-web.onrender.com,http://localhost:*,http://127.0.0.1:*"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false

  - type: web
    name: fashionai-web
    branch: Webapp
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.web
    dockerContext: .
    healthCheckPath: /
    envVars:
      # Passed as Docker build ARG (see Dockerfile.web) and at runtime.
      - key: API_BASE_URL
        value: https://fashionai-api.onrender.com
